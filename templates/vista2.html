<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2">
    <title>Evaluación 4.2 - Vista Radar (Vista 2)</title>
    <style>
        #menu-navegacion { background-color: #34495e; padding: 15px; text-align: center; }
        #link-inicio { color: #bdc3c7; margin: 0 15px; text-decoration: none; }
        #link-v2 { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; border-bottom: 2px solid #e74c3c;}
        #link-v3 { color: #bdc3c7; margin: 0 15px; text-decoration: none; }

        #titulo-principal { color: #2c3e50; text-align: center; }
        #explicacion-caja { background-color: #ecf0f1; padding: 10px; border: 1px solid #bdc3c7; text-align: center; margin: 20px; }
        #radar-contenedor { position: relative; width: 300px; height: 300px; background-color: #2c3e50; margin: 0 auto; border: 5px solid #bdc3c7; border-radius: 10px; overflow: hidden; }
        #eje-x-linea { position: absolute; background-color: #7f8c8d; height: 100%; width: 2px; left: 50%; }
        #eje-y-linea { position: absolute; background-color: #7f8c8d; width: 100%; height: 2px; top: 50%; }
        #coordenadas { text-align: center; }
    </style>
</head>
<body>
    <nav id="menu-navegacion">
        <a id="link-inicio" href="/">Vista Principal</a>
        <a id="link-v2" href="/vista2">Vista Radar</a>
        <a id="link-v3" href="/vista3">Vista Indicadores</a>
    </nav>

    <h1 id="titulo-principal">Vista Creativa: Modo Radar</h1>

    <div id="explicacion-caja">
        <p id="texto-exp">El punto objetivo se desplaza gráficamente dentro del contenedor dependiendo de los valores de los ejes X e Y.</p>
    </div>

    <h3 id="coordenadas">Objetivo fijado en -> X: {{ ejeX }} | Y: {{ ejeY }}</h3>

    <div id="radar-contenedor">
        <div id="eje-x-linea"></div>
        <div id="eje-y-linea"></div>
        <div id="punto-sensor" style="position: absolute; width: 20px; height: 20px; background-color: #e74c3c; border-radius: 50%; left: calc(50% + {{ ejeX * 10 }}px); top: calc(50% + {{ ejeY * 10 }}px);"></div>
    </div>
</body>
</html>
